#!/bin/bash
# ==============================================================================
# Arquivo: core/config.conf
# Versão: 4.0.3
# Data: 2026-02-24
# Objetivo: Arquivo de configuração compartilhado entre todos os scripts
# Autor: V3RTECH Tecnologia, Consultoria e Inovação
# Website: https://v3rtech.com.br/
# ==============================================================================
#
# Este arquivo armazena o estado compartilhado entre scripts, permitindo que
# cada script seja executado independentemente sem duplicar detecção de sistema
# ou perguntas ao usuário.
#
# Localização: ~/.config/v3rtech-scripts/config.conf
# Criado automaticamente na primeira execução
#
# ==============================================================================

# --- DETECÇÃO DE SISTEMA (Preenchido automaticamente) ---
DISTRO_FAMILY=""          # arch, debian, fedora
DISTRO_NAME=""            # ubuntu, arch, fedora, etc
PKG_MANAGER=""            # apt, pacman, dnf
DESKTOP_ENV=""            # kde, gnome, xfce, deepin, cosmic
SESSION_TYPE=""           # x11, wayland
GPU_VENDOR=""             # intel, amd, nvidia
IS_IMMUTABLE=""           # true, false

# --- PREFERÊNCIAS DO USUÁRIO (Perguntadas uma única vez) ---
PREFER_NATIVE=""          # true, false (true = nativo quando disponível)
INSTALL_CATEGORIES=""     # Lista de categorias selecionadas (ex: "internet office dev")

# --- EXCEÇÕES (Hardcoded) ---
FILEBOT_METHOD="flatpak"  # FileBot sempre via Flatpak
SUBLIMINAL_METHOD="pipx"  # Subliminal sempre via Pipx

# --- DIRETÓRIOS CRÍTICOS ---
BASE_DIR=""               # Diretório raiz dos scripts
LIB_DIR=""                # Diretório de scripts lib/
UTILS_DIR=""              # Diretório de utilitários
CONFIGS_DIR=""            # Diretório de configurações
RESOURCES_DIR=""          # Diretório de recursos
CONFIG_HOME=""            # ~/.config/v3rtech-scripts
LOG_DIR=""                # ~/.config/v3rtech-scripts/logs

# --- INFORMAÇÕES DO USUÁRIO ---
REAL_USER=""              # Usuário que executou o script
REAL_HOME=""              # Home do usuário
LOG_FILE=""               # Arquivo de log principal

# --- FLAGS DE CONTROLE ---
DRY_RUN=0                 # Se 1, simula ações sem executar
AUTO_CONFIRM=0            # Se 1, responde "Sim" automaticamente
VERBOSE=0                 # Se 1, exibe mais detalhes

# --- TIMESTAMP DA ÚLTIMA ATUALIZAÇÃO ---
LAST_UPDATE=""            # Data/hora da última atualização deste arquivo
